<!DOCTYPE html>
<html>
<head>
    <title>chou yi chen</title>
    <style>
        body {
            padding: 10px;
            background-color: white;
        }

        .container {
            background-color: white;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 200px;
        }
      
        .box-1 {
            border: 5px double #ff6347;
            background-color: #add8e6;
            margin-bottom: 10px;
            padding: 5px;
            font-weight: bold;
        }
      
        .box-2 {
            border: 3px solid #1e90ff; 
            background-color: Yellow; 
            border-radius: 10px; 
            margin-bottom: 10px;
            padding: 5px;
            font-weight: bold;
        }

        .box-3 {
            border: 4px dotted #808080;
            background-color: MediumSeaGreen;
            font-weight: bold;
            padding: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box-1">Hello World</div>
        <div class="box-2">Hello World</div>
        <div class="box-3">Hello World</div>
    </div>

</body>

</body>
</html>
