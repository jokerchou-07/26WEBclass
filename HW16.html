<!DOCTYPE html>
<html>
<head>
    <title>chou yi chen</title>
    <style>
        body {
            font-family: serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            background-color: #f0f0f0;
        }

        .container {
            background-color: white;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 500px;
        }
      
        .box-1 {
            border: 5px double #ff6347;
            background-color: #add8e6;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 32px;
            font-weight: bold;
        }
      
        .box-2 {
            border: 3px solid #1e90ff; 
            background-color: "Yellow"; 
            border-radius: 15px; 
            padding: 10px;
            margin-bottom: 20px;
            font-size: 32px;
            font-weight: bold;
        }

        .box-3 {
            border: 8px dotted #808080;
            background-color: "MediumSeaGreen";
            padding: 10px;
            font-size: 32px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box-1">Hello World</div>
        <div class="box-2">Hello World</div>
        <div class="box-3">Hello World</div>
    </div>

</body>

</body>
</html>
