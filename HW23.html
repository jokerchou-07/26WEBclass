<!DOCTYPE html>
<head>
  <title>chou yi chen</title>
</head>
<body>

    <div class="header-bar">
        <span>預覽</span>
        <button id="toggleBtn" class="info-btn">查看資訊</button>
    </div>

    <div class="preview-area">
        <div class="image-box">
            <img src="pic.png" alt="Preview">
        </div>
    </div>

    <div id="infoDetails" class="info-details">
        <div class="info-row">修改日期：2017/10/12</div>
        <div class="info-row">類別：JPG</div>
        <div class="info-row">大小：466.97KB</div>
        <div class="info-row">路徑：\\designcenter.qnap.com.tw\DesignCenter\PM...</div>
    </div>

    <script>
        const btn = document.getElementById('toggleBtn');
        const info = document.getElementById('infoDetails');

        btn.addEventListener('click', () => {
            // 切換顯示狀態
            if (info.style.display === 'block') {
                info.style.display = 'none';
                btn.textContent = '查看資訊';
            } else {
                info.style.display = 'block';
                btn.textContent = '查看資訊';
            }
        });
    </script>
</body>
<style>
    body {
        font-family: 'Roboto', sans-serif;
        padding: 20px;
        background-color: #f9f9f9;
    }
    
    .header-bar {
        width: 500px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        font-size: 13px;
        color: #707070;
    }
    
    .info-btn {
        height: 22px;
        padding: 0 18px;
        border-radius: 8px;
        border: 1px solid #2f2f2f;
        background-color: #ffffff;
        color: #2f2f2f;
        font-size: 13px;
        cursor: pointer;
        transition: 0.2s;
    }
    
    .info-btn:hover {
        background-color: #f0f0f0;
    }
    
    /* 圖片預覽框 */
    .preview-area {
        width: 496px;
        height: 240px; /* 固定高度 */
        background-color: #ffe0b2;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 1px solid #eaeaea;
        overflow: hidden; /* 確保內容不超出邊框 */
    }
  
    .image-box {
        height: 100%; /* 讓容器撐滿父層高度 */
        display: flex;
        justify-content: center;
        align-items: center;
    }
  
    .image-box img {
        height: 100%;    /* 重點：強制圖片高度撐滿 */
        width: auto;      /* 寬度自動，維持原始比例 */
        display: block;   /* 消除圖片下方微小間隙 */
        object-fit: contain; 
    }
    
    .info-details {
        display: none; 
        width: 496px;
        margin-top: 10px;
    }
    
    .info-row {
        color: #707070;
        font-size: 13px;
        padding: 2px;
        margin-bottom: 6px;
    }
</style>
</html>
