<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chou yi chen</title>
    <style>
        body {
            background-color: #4da6ff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .main-container {
            background-color: white;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            border-radius: 20px;
            box-sizing: border-box;
        }

        .top-box {
            background-color: #a6d947;
            height: 150px;
            margin-bottom: 15px;
            width: 100%;
        }

        .mid-container {
            display: flex;
            flex-direction: row;
            gap: 15px;
            margin-bottom: 15px;
        }

        .mid-box {
            background-color: #00bcd4;
            flex: 1; 
            height: 150px;
            min-height: 100px;
        }

        .bottom-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .bottom-box {
            background-color: #eceff1;
            flex: 1 1 calc(25% - 8px); 
            height: 80px;
        }

        @media screen and (max-width: 480px) {
            .mid-container {
                flex-direction: column !important;
            }

            .mid-box {
                width: 100%;
                height: 70px;
                flex: none;
            }

            .bottom-box {
                /* 改為佔 50%，達成 2x2 */
                flex: 0 0 calc(50% - 5px); 
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="top-box"></div>

        <div class="mid-container">
            <div class="mid-box"></div>
            <div class="mid-box"></div>
            <div class="mid-box"></div>
        </div>

        <div class="bottom-container">
            <div class="bottom-box"></div>
            <div class="bottom-box"></div>
            <div class="bottom-box"></div>
            <div class="bottom-box"></div>
        </div>
    </div>
</body>
</html>
