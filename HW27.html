<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chou yi chen - Fixed</title>
    <style>
        body {
            background-color: #4da6ff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .main-container {
            background-color: white;
            width: 100%;
            max-width: 500px; /* 縮小最大寬度，更容易觀察切換 */
            padding: 20px;
            border-radius: 20px;
            box-sizing: border-box;
        }

        .top-box {
            background-color: #a6d947;
            height: 150px;
            margin-bottom: 15px;
            width: 100%;
        }

        .mid-container {
            display: flex;
            flex-direction: row; /* 寬螢幕預設橫排 */
            gap: 15px;
            margin-bottom: 15px;
        }

        .mid-box {
            background-color: #00bcd4;
            flex: 1; 
            height: 150px; /* 確保橫排時有高度 */
            min-height: 100px; /* 強制最低高度 */
        }

        .bottom-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .bottom-box {
            background-color: #eceff1;
            /* 寬螢幕 4 欄 */
            flex: 1 1 calc(25% - 8px); 
            height: 80px;
        }

        /* --- 修正後的媒體查詢 --- */
        @media screen and (max-width: 480px) {
            .mid-container {
                flex-direction: column !important; /* 強制改為垂直堆疊 */
            }

            .mid-box {
                width: 100%;
                height: 100px;
                flex: none; /* 關閉彈性縮放，確保高度不被壓扁 */
            }

            .bottom-box {
                /* 改為佔 50%，達成 2x2 */
                flex: 0 0 calc(50% - 5px); 
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="top-box"></div>

        <div class="mid-container">
            <div class="mid-box"></div>
            <div class="mid-box"></div>
            <div class="mid-box"></div>
        </div>

        <div class="bottom-container">
            <div class="bottom-box"></div>
            <div class="bottom-box"></div>
            <div class="bottom-box"></div>
            <div class="bottom-box"></div>
        </div>
    </div>
</body>
</html>
