<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>chou yi chen</title>
    <style>
        body {
            font-family: serif; 
            display: flex;
            padding-top: 20px;
        }

        .main-card {
            border: 1px solid #ccc;
            padding: 30px;
            width: 600px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background-color: white;
        }

        .h1-style {
            font-size: 40px;
            font-weight: bold;
            display: inline-block;
            border-top: 5px solid black;
            padding-top: 5px;
            text-shadow: 3px 3px 0px pink; 
            margin-bottom: 30px;
        }

        .h2-style {
            font-size: 32px;
            font-style: italic;
            font-weight: bold;
            
            background-color: white;
            border: 3px solid yellow;
            outline: 1px solid black; 
            outline-offset: -5px; 
            
            padding: 10px 20px;
            width: fit-content;
            min-width: 550px;
        }
        
        .h3-style {
            text-align: right;
            text-decoration: underline;
            font-size: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1 class="h1-style">This is heading 1</h1>
        
        <div class="h2-style">This is heading 2</div>
        
        <h3 class="h3-style">This is heading 3</h3>
    </div>

</body>
</html>
