<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>chou yi chen</title>
    <style>
        body {
            font-family: serif; /* 使用襯線體以符合圖片外觀 */
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .main-card {
            border: 1px solid #ccc;
            padding: 30px;
            width: 600px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); /* 模仿圖片的陰影 */
            background-color: white;
        }

        /* 第一個標題：上方橫線 */
        .h1-style {
            font-size: 48px;
            font-weight: bold;
            display: inline-block; /* 讓邊框長度隨文字縮放 */
            border-top: 5px solid black; /* 使用 border 代替 overline 以增加粗細 */
            padding-top: 5px;
            /* 文字陰影：向右下偏移，無模糊，顏色為粉紅 */
            text-shadow: 3px 3px 0px pink; 
            margin-bottom: 30px;
        }

        /* 修正 Heading 2：雙層邊框（外黃內黑）+ 斜體 */
        .h2-style {
            font-size: 32px;
            font-style: italic;
            font-weight: bold;
            
            /* 核心：結合 border 與 outline 達成雙層感 */
            background-color: white;
            border: 3px solid yellow;  /* 外層黃色粗邊 */
            outline: 1px solid black; /* 內層黑色細邊 */
            outline-offset: -5px;     /* 讓黑色線向內縮，形成間距 */
            
            padding: 10px 20px;
            width: fit-content;       /* 寬度隨內容調整 */
            min-width: 600px;         /* 模仿圖片長度 */
        }

        /* 第三個標題：靠右對齊、底線 */
        .h3-style {
            text-align: right;
            text-decoration: underline;
            font-size: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1 class="h1-style">This is heading 1</h1>
        
        <div class="h2-style">This is heading 2</div>
        
        <h3 class="h3-style">This is heading 3</h3>
    </div>

</body>
</html>
