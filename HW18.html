<!DOCTYPE html>
<head>
    <title>chou yi chen</title>
    <style>
        body {
            font-family: serif;
            display: flex;
            justify-content: center;
            padding-top: 10px;
        }

        .main-card {
            border: 1px solid #ccc;
            padding: 10px;
            width: 300px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background-color: white;
        }

        .h1-style {
            text-decoration: overline;
            font-size: 30px;
            margin-top: 0;
        }

        .h2-style {
            background-color: yellow;
            font-style: italic;
            border: 3px inset #ffd700;
            padding: 2px 5px;
            font-size: 24px;
            font-weight: bold;
        }

        .h3-style {
            text-align: right;
            text-decoration: underline;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1 class="h1-style">This is heading 1</h1>
        
        <div class="h2-style">This is heading 2</div>
        
        <h3 class="h3-style">This is heading 3</h3>
    </div>

</body>
</html>
