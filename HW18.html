<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>chou yi chen</title>
    <style>
        body {
            font-family: serif; /* 使用襯線體以符合圖片外觀 */
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .main-card {
            border: 1px solid #ccc;
            padding: 30px;
            width: 600px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); /* 模仿圖片的陰影 */
            background-color: white;
        }

        /* 第一個標題：上方橫線 */
        .h1-style {
            text-decoration: overline;
            font-size: 36px;
            margin-top: 0;
        }

        /* 第二個標題：黃色背景、斜體、立體邊框 */
        .h2-style {
            background-color: yellow;
            font-style: italic;
            border: 3px inset #ffd700; /* 使用 inset 營造內凹立體感 */
            padding: 5px 10px;
            font-size: 28px;
            font-weight: bold;
        }

        /* 第三個標題：靠右對齊、底線 */
        .h3-style {
            text-align: right;
            text-decoration: underline;
            font-size: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1 class="h1-style">This is heading 1</h1>
        
        <div class="h2-style">This is heading 2</div>
        
        <h3 class="h3-style">This is heading 3</h3>
    </div>

</body>
</html>
