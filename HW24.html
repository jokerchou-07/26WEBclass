<!DOCTYPE html>
<head>
    <title>chou yi chen</title>
</head>
<body>

    <div class="container">
        <img src="pic.png" alt="No Distortion" class="img-left">

        <img src="pic.png" alt="Circular" class="img-center">

        <img src="pic.png" alt="Distorted" class="img-right">
    </div>

</body>
<style>
        .container {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding: 50px;
            gap: 20px;
        }

        img {
            display: block;
        }

        /* 1. 左側圖片：圓角且不變形 */
        .img-left {
            width: 33%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover;
        }

        /* 2. 中間圖片：圓形且不變形 */
        .img-center {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 1px solid
            object-fit: cover;
        }

        /* 3. 右側圖片：強制拉伸產生變形 */
        .img-right {
            width: 33%;
            height: 300px;
            object-fit: fill;
        }
    </style>
</html>
