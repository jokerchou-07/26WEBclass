<!DOCTYPE html>
<body>

  <canvas id="c" width="400" height="250"></canvas>

  <script>
    const ctx = document.getElementById('c').getContext('2d');

    // 畫長方形（藍色）
    ctx.fillStyle = "blue";
    ctx.fillRect(60, 60, 220, 120);

    // 長方形邊框
    ctx.strokeStyle = "black";
    ctx.lineWidth = 4;
    ctx.strokeRect(60, 60, 220, 120);

    // 畫圓形（黃色），與長方形重疊
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(240, 120, 70, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "red";
    ctx.lineWidth = 4;
    ctx.stroke();
  </script>

</body>
</html>
