<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mouse Event Demo</title>
  <style>
    body {
      font-family: Times New Roman, serif;
      text-align: center;
      margin-top: 40px;
    }

    #text {
      font-size: 36px;
      color: black;
      margin-bottom: 20px;
    }

    button {
      font-size: 16px;
      padding: 6px 20px;
    }
  </style>
</head>
<body>

  <div id="text">Hello</div>

  <button
    onmouseover="mouseOver()"
    onclick="mouseClick()"
  >
    Button
  </button>

  <script>
    function mouseOver() {
      const text = document.getElementById("text");
      text.innerHTML = "Hello";
      text.style.color = "magenta";
    }

    function mouseClick() {
      const text = document.getElementById("text");
      text.innerHTML = "Mouse Click";
      text.style.color = "magenta";
    }
  </script>

</body>
</html>
